listeners:
  - address: "0.0.0.0:4000"

    routing:
      type: http
      default_cluster: web

      rules:
        - host: api.example.com
          cluster: web

clusters:
  - name: web
    lb: p2c

    backends:
      - address: "127.0.0.1:8081"
        weight: 1
        tau: 10

      - address: "127.0.0.1:8082"
        weight: 1
        tau: 10

    
limits:
  max_connections: 100000


ratelimit:
  per_ip_rps: 100

Drain_timeout: 5m