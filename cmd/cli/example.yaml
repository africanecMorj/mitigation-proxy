listeners:
  - name: main-tcp
    address: ":4000"
    protocol: tcp

    routing:
      type: sni_alpn

      rules:
        - host: api.example.com
          alpn: ["h2"]
          cluster: grpc_cluster

        - host: api.example.com
          alpn: ["http/1.1"]
          cluster: rest_cluster

        - host: "*.example.com"
          cluster: web_cluster

        - default: true
          cluster: default_cluster

  - name: quic
    address: ":4433"
    protocol: udp

    routing:
      type: quic
      default_cluster: h3_cluster

clusters:
  - name: grpc_cluster
    lb: ewma
    pool:
      max_idle: 128
      warm: 32

    backends:
      - address: 10.0.0.1:50051
        weight: 1
      - address: 10.0.0.2:50051
        weight: 1

  - name: rest_cluster
    lb: EWMA
    pool:
      max_idle: 256

    backends:
      - address: 127.0.0.1:8080
      - address: 127.0.0.1:8080

  - name: web_cluster
    lb: round_robin

    backends:
      - address: 127.0.0.1:8080
      - address: 127.0.0.1:8080

  - name: h3_cluster
    lb: p2c

    backends:
      - address: 127.0.0.1:8080
      - address: 127.0.0.1:8080

  - name: default_cluster
    lb: round_robin

    backends:
      - address: 127.0.0.1:8080

global:
  workers: 4

  limits:
    max_connections: 100000

  timeouts:
    client_hello: 2s
    idle: 60s

  ratelimit:
    per_ip_rps: 100
